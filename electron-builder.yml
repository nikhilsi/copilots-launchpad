appId: com.copilots-launchpad.app
productName: CoPilots Launchpad
win:
  target: nsis
  icon: assets/icon.ico
mac:
  target: dmg
  icon: assets/icon-256.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
files:
  - electron/**/*
  - build/**/*
  - package.json
extraResources:
  - assets/*
