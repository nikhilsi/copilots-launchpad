appId: com.copilots-launchpad.app
productName: CoPilots Launchpad
win:
  target: nsis
  icon: assets/icon.ico
  azureSignOptions:
    endpoint: "https://wus.codesigning.azure.net/"
    certificateProfileName: "copilots-launchpad"
    codeSigningAccountName: "copilotslaunchpad"
    publisherName: "Urmila Singhal"
mac:
  target: dmg
  icon: assets/icon-512.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
files:
  - electron/**/*
  - build/**/*
  - package.json
extraResources:
  - assets/*
